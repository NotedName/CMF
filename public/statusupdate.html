<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Status Update</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <!-- Inline script to apply dark mode before paint -->
  <script>
    (function() {
      const darkMode = localStorage.getItem('darkMode');
      if (darkMode === 'enabled') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>
  <!-- Firebase SDK (modular) with getDoc added -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyD_35ndCAFRu4tkyyK6jliIS8l3QqGVgK8",
      authDomain: "cmf-mcs.firebaseapp.com",
      projectId: "cmf-mcs",
      storageBucket: "cmf-mcs.firebasestorage.app",
      messagingSenderId: "156302336546",
      appId: "1:156302336546:web:373c1b25d24c4a9131e07b",
      measurementId: "G-PJY3RN9XLH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.auth = auth;
    window.db = db;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signOut = signOut;
    window.collection = collection;
    window.getDocs = getDocs;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.doc = doc;
    window.query = query;
    window.orderBy = orderBy;
  </script>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left" onclick="goHome()" style="cursor: pointer;">
      <img src="Resources/smcmilogo.png" alt="SMCMI Logo" class="logo">
    </div>
    <div class="topbar-right">
        <!-- Help first -->
        <div onclick="needHelp()" style="display: flex; align-items: center; cursor: pointer;">
            <span class="need-help-text">NEED HELP</span>
            <span class="help-icon">?</span>
        </div>
        <!-- Dark mode toggle second -->
        <div onclick="toggleDarkMode()" style="display: flex; align-items: center; cursor: pointer; margin-right: 8px;">
            <span class="darkmode-icon" id="darkModeIcon">☾</span>
        </div>
        <!-- Hamburger last (mobile only) -->
        <div class="hamburger" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        </div>
  </div>

  <div class="main-wrapper">

    <!-- SIDEBAR with STATUS UPDATE active -->
    <div class="sidebar">
     <div class="nav" onclick="goHome()">HOME</div>
     <div class="nav" onclick="goRegister()">REGISTRATION</div>
     <div class="nav" onclick="goStatusUpdate()">STATUS UPDATE</div>   <!-- removed active -->
     <div class="nav" onclick="goRegistered()">REGISTERED</div>
     <div class="logout" onclick="logout()">LOGOUT</div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <h2 style="margin-bottom: 30px;">Status Update</h2>
      <!-- RFID search -->
      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="rfidSearch" placeholder="Enter RFID number" style="flex:1; height:38px; padding:8px; border:1.5px solid #ddd; border-radius:8px;">
        <button onclick="searchStudent()" class="export-btn" style="width:auto;">Search</button>
      </div>
      <!-- Result area (hidden until search) -->
      <div id="studentResult" style="display: none;"></div>
    </div>

  </div>

  <!-- Scripts and modals -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="script.js"></script>

  <!-- Help Modal -->
  <div id="helpModal" class="modal">
    <div class="modal-content">
      <p>Please contact the system administrator for assistance.</p>
      <button onclick="closeHelpModal()">OK</button>
    </div>
  </div>

  <!-- Logout Confirmation Modal -->
  <div id="logoutModal" class="modal">
    <div class="modal-content">
      <p id="logoutMessage">Are you sure you want to logout?</p>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="confirmLogout()">Yes</button>
        <button onclick="closeLogoutModal()">No</button>
      </div>
    </div>
  </div>

  <!-- Export Modal (kept for consistency) -->
  <div id="exportModal" class="modal">
    <div class="modal-content">
      <p>Choose export format:</p>
      <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
        <button onclick="exportChosen('pdf')">PDF</button>
        <button onclick="exportChosen('excel')">Excel</button>
      </div>
      <div style="display: flex; justify-content: center;">
        <button onclick="closeExportModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Message Modal (for feedback) -->
  <div id="messageModal" class="modal">
    <div class="modal-content">
      <p id="messageModalText">Message</p>
      <button onclick="closeMessageModal()">OK</button>
    </div>
  </div>

  <!-- Mobile menu overlay -->
  <div class="menu-overlay" onclick="closeMobileMenu()"></div>

</body>
</html>
