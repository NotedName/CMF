<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clearance Tracking</title>
  <link rel="icon" type="image/svg+xml" href="Resources/icon.svg">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK (modular) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, orderBy, addDoc, where, limit } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyD_35ndCAFRu4tkyyK6jliIS8l3QqGVgK8",
      authDomain: "cmf-mcs.firebaseapp.com",
      projectId: "cmf-mcs",
      storageBucket: "cmf-mcs.firebasestorage.app",
      messagingSenderId: "156302336546",
      appId: "1:156302336546:web:373c1b25d24c4a9131e07b",
      measurementId: "G-PJY3RN9XLH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.auth = auth;
    window.db = db;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signOut = signOut;
    window.collection = collection;
    window.getDocs = getDocs;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.doc = doc;
    window.query = query;
    window.orderBy = orderBy;
    window.addDoc = addDoc;
    window.where = where;
    window.limit = limit; 
  </script>
</head>
<body>
  <script>
    (function() {
      const darkMode = localStorage.getItem('darkMode');
      if (darkMode === 'enabled') document.body.classList.add('dark-mode');
    })();
  </script>
  <div class="topbar">
    <div class="topbar-left">
      <div class="hamburger" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <img src="Resources/smcmilogoonly.png" alt="SMCMI Logo" class="logo-icon">
      <img src="Resources/smcmilogotext.png" alt="St. Mary's College" class="logo-text">
    </div>
    <div class="topbar-right">
      <div onclick="needHelp()" style="display: flex; align-items: center; cursor: pointer;">
        <span class="need-help-text">NEED HELP</span>
        <span class="help-icon">?</span>
      </div>
      <div onclick="toggleDarkMode()" style="display: flex; align-items: center; cursor: pointer; margin-right: 8px;">
        <span class="darkmode-icon" id="darkModeIcon">☾</span>
      </div>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="sidebar">
      <div class="nav" onclick="goHome()">HOME</div>
      <div class="nav" onclick="goRegister()">REGISTRATION</div>
      <div class="nav" onclick="goStatusUpdate()">STATUS UPDATE</div>
      <div class="nav" onclick="goRegistered()">CLEARANCE TRACKING</div>
      <div class="sidebar-spacer"></div>
      <div class="logout" onclick="logout()">LOGOUT</div>
    </div>

    <div class="content">
      <!-- FILTER BAR with improved responsive behavior -->
      <div class="filter-bar" style="justify-content: space-between;">
        <!-- Left section: search and filter dropdowns -->
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
          <div class="search-wrapper" style="margin:0; min-width: 200px;">
            <input type="text" id="search" placeholder="Search by any field" onkeyup="applyFilters()">
            <span class="search-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16" y1="16" x2="22" y2="22"></line>
              </svg>
            </span>
          </div>

          <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <label for="statusFilter">Status:</label>
            <select id="statusFilter" onchange="applyFilters()">
              <option value="">All</option>
              <option value="Claimed">Claimed</option>
              <option value="Returned">Returned</option>
            </select>

            <label for="semesterFilter">Semester:</label>
            <select id="semesterFilter" onchange="applyFilters()">
              <option value="">All</option>
              <!-- options populated by JavaScript -->
            </select>

            <label for="remarksFilter">Remarks:</label>
            <select id="remarksFilter" onchange="applyFilters()">
              <option value="">All</option>
              <!-- options populated by JavaScript -->
            </select>

            <button onclick="clearFilters()" class="clear-btn">Clear</button>
            <button onclick="refreshTable()" class="refresh-btn">Refresh</button>
          </div>
        </div>

        <!-- Right section: export button -->
        <div>
          <button onclick="showExportModal()" class="export-btn">Export</button>
        </div>
      </div>

      <div class="table-responsive">
        <table id="clearanceLogTable">
          <thead>
            <tr>
              <th>RFID NO.</th>
              <th>ID NUMBER</th>
              <th>NAME</th>
              <th>RELEASE DATE</th>
              <th>RECEIVE DATE</th>
              <th>ACADEMIC YEAR</th>
              <th>SEMESTER</th>
              <th>REMARKS</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody>
            <!-- rows generated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    (function() {
      const unsubscribe = window.auth.onAuthStateChanged(function(user) {
        if (!user) {
          window.location.href = 'index.html';
        }
        unsubscribe();
      });
    })();
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="script.js"></script>

  <!-- Modals (help, logout, export, message) -->
  <div id="helpModal" class="modal"><div class="modal-content"><p>Please contact system developer for assistance.</p><button onclick="closeHelpModal()">OK</button></div></div>
  <div id="logoutModal" class="modal"><div class="modal-content"><p id="logoutMessage">Are you sure you want to logout?</p><div style="display: flex; gap: 10px; justify-content: center;"><button onclick="confirmLogout()">Yes</button><button onclick="closeLogoutModal()">No</button></div></div></div>
  <div id="exportModal" class="modal"><div class="modal-content"><p>Choose export format:</p><div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;"><button onclick="exportChosen('pdf')">PDF</button><button onclick="exportChosen('excel')">Excel</button></div><div style="display: flex; justify-content: center;"><button onclick="closeExportModal()">Cancel</button></div></div></div>
  <div id="messageModal" class="modal"><div class="modal-content"><p id="messageModalText">Message</p><button onclick="closeMessageModal()">OK</button></div></div>
  <div class="menu-overlay" onclick="closeMobileMenu()"></div>
</body>
</html>
