<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clearance - Login</title>
  <link rel="icon" type="image/svg+xml" href="Resources/icon.svg">
  <link rel="icon" href="data:,"> <!-- empty favicon -->
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK (modular) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, orderBy, addDoc, where, limit } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyD_35ndCAFRu4tkyyK6jliIS8l3QqGVgK8",
      authDomain: "cmf-mcs.firebaseapp.com",
      projectId: "cmf-mcs",
      storageBucket: "cmf-mcs.firebasestorage.app",
      messagingSenderId: "156302336546",
      appId: "1:156302336546:web:373c1b25d24c4a9131e07b",
      measurementId: "G-PJY3RN9XLH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.auth = auth;
    window.db = db;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signOut = signOut;
    window.collection = collection;
    window.getDocs = getDocs;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.doc = doc;
    window.query = query;
    window.orderBy = orderBy;
    window.addDoc = addDoc;
    window.where = where;
    
  </script>
</head>
<body>
<script>
  (function() {
    const darkMode = localStorage.getItem('darkMode');
    if (darkMode === 'enabled') document.body.classList.add('dark-mode');
  })();
</script>
<script>
  (function() {
    const unsubscribe = window.auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = 'home.html';
      }
      unsubscribe();
    });
  })();
</script>
  <!-- TOP BAR (same as other pages) -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="hamburger" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <img src="Resources/smcmilogoonly.png" alt="SMCMI Logo" class="logo-icon">
      <img src="Resources/smcmilogotext.png" alt="St. Mary's College" class="logo-text">
    </div>
    <div class="topbar-right">
      <!-- Help first -->
      <div onclick="needHelp()" style="display: flex; align-items: center; cursor: pointer;">
        <span class="need-help-text">NEED HELP</span>
        <span class="help-icon">?</span>
      </div>
      <!-- Dark mode toggle second -->
      <div onclick="toggleDarkMode()" style="display: flex; align-items: center; cursor: pointer; margin-right: 8px;">
        <span class="darkmode-icon" id="darkModeIcon">☾</span>
      </div>
    </div>
  </div>

  <div class="login-container">
    <div class="logo-container">
      <img src="Resources/lightmodelogo.png" alt="Clearance Monitoring System" class="logo-light">
      <img src="Resources/darkmodelogo.png" alt="Clearance Monitoring System" class="logo-dark">
    </div>

    <div class="field">
      <label>USERNAME</label>
      <input type="text" id="username">
    </div>

    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="password">
    </div>

    <div class="show-password">
      <span>SHOW PASSWORD</span>
      <input type="checkbox" onclick="togglePassword()">
    </div>

    <button onclick="login()">LOGIN</button>
  </div>
  
  <!-- Error Modal -->
  <div id="errorModal" class="modal" onclick="if(event.target === this) closeErrorModal()">
    <div class="modal-content">
      <p>Invalid username or password</p>
      <button onclick="closeErrorModal()">OK</button>
    </div>
  </div>

  <!-- Help Modal (now inside body) -->
  <div id="helpModal" class="modal">
    <div class="modal-content">
      <p>Please contact system developer for assistance.</p>
      <button onclick="closeHelpModal()">OK</button>
    </div>
  </div>
<!-- SheetJS (XLSX) for proper Excel export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <!-- Script at the end so DOM is ready -->
  <script src="script.js"></script>
  <!-- Message Modal (for empty fields, etc.) -->
  <div id="messageModal" class="modal">
    <div class="modal-content">
      <p id="messageModalText">Message</p>
      <button onclick="closeMessageModal()">OK</button>
    </div>
  </div>
  <!-- Mobile menu overlay -->
<div class="menu-overlay" onclick="closeMobileMenu()"></div>
</body>
</html>
