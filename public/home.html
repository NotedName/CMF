<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Home Page</title>
  <link rel="icon" type="image/svg+xml" href="Resources/icon.svg">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <!-- Add these inside <head> after the existing links -->
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://cdn.sheetjs.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://cdn.sheetjs.com">
  <script type="module">
    import { auth, db } from './firebase.js';
    import { checkPageAccess, logout, confirmLogout, handleHelpClick, updateTopBarForRole } from './auth.js';
    import { loadStudents, handleHomeSort, editSelectedHome, deleteSelectedHome, confirmDelete } from './students.js';
    import { showExportModal, closeExportModal, exportChosen } from './export.js';
    import { toggleDarkMode, loadDarkModePreference, toggleMobileMenu, closeMobileMenu, showHelpModal, closeHelpModal, showLogoutModal, closeLogoutModal, showMessageModal, closeMessageModal, enablePullToRefresh, debounce } from './ui.js';
    import { applyFilters, clearFilters, refreshTable } from './filters.js'; // we'll need a filters.js for shared filter logic

    // Attach to window
    window.logout = logout;
    window.confirmLogout = confirmLogout;
    window.handleHelpClick = handleHelpClick;
    window.toggleDarkMode = toggleDarkMode;
    window.toggleMobileMenu = toggleMobileMenu;
    window.closeMobileMenu = closeMobileMenu;
    window.showHelpModal = showHelpModal;
    window.closeHelpModal = closeHelpModal;
    window.showLogoutModal = showLogoutModal;
    window.closeLogoutModal = closeLogoutModal;
    window.showMessageModal = showMessageModal;
    window.closeMessageModal = closeMessageModal;
    window.editSelectedHome = editSelectedHome;
    window.deleteSelectedHome = deleteSelectedHome;
    window.confirmDelete = confirmDelete;
    window.showExportModal = showExportModal;
    window.closeExportModal = closeExportModal;
    window.exportChosen = exportChosen;
    window.applyFilters = applyFilters;
    window.clearFilters = clearFilters;
    window.refreshTable = refreshTable;
    window.updateSelectAllHomeState = function() {
      const selectAll = document.getElementById('selectAllHome');
      if (!selectAll) return;
      const checkboxes = document.querySelectorAll('#homeTable tbody .home-checkbox');
      selectAll.checked = Array.from(checkboxes).every(cb => cb.checked);
    };
    window.toggleSelectAllHome = function(checkbox) {
      const checkboxes = document.querySelectorAll('#homeTable tbody .home-checkbox');
      checkboxes.forEach(cb => cb.checked = checkbox.checked);
      window.updateSelectAllHomeState();
    };

    checkPageAccess(['admin', 'superadmin']).then(role => {
      loadStudents();
      updateTopBarForRole(auth.currentUser);
      enablePullToRefresh(() => loadStudents());
    });

    // Attach sort listeners
    document.querySelectorAll('#homeTable th').forEach((th, index) => {
      if (index === 0) return;
      th.addEventListener('click', () => handleHomeSort(index));
    });

    loadDarkModePreference();
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <script>
    (function() {
      const darkMode = localStorage.getItem('darkMode');
      if (darkMode === 'enabled') document.body.classList.add('dark-mode');
    })();
  </script>
  <div class="topbar">
    <div class="topbar-left">
      <div class="hamburger" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <img src="Resources/smcmilogoonly.png" alt="SMCMI Logo" class="logo-icon" loading="lazy">
      <img src="Resources/smcmilogotext.png" alt="St. Mary's College" class="logo-text" loading="lazy"> 
    </div>
    <div class="topbar-right">
      <div id="helpButton" onclick="handleHelpClick()" style="display: flex; align-items: center; cursor: pointer;">
        <span id="helpText" class="need-help-text"></span>
        <span class="help-icon">?</span>
      </div>
      <div onclick="toggleDarkMode()" style="display: flex; align-items: center; cursor: pointer; margin-right: 8px;">
        <span class="darkmode-icon" id="darkModeIcon">☾</span>
      </div>
    </div>
  </div>
  <div class="main-wrapper">
    <div class="sidebar">
      <div class="nav" onclick="goHome()">STUDENT LIST</div>
      <div class="nav" onclick="goRegister()">REGISTRATION</div>
      <div class="nav" onclick="goStatusUpdate()">STATUS UPDATE</div>
      <div class="nav" onclick="goRegistered()">CLEARANCE LOGS</div>
      <div class="nav" onclick="goAdmin()">MANAGE PROGRAMS</div>
      <div class="sidebar-spacer"></div>
      <div class="logout" onclick="logout()">LOGOUT</div>
    </div>
    <div class="content">
      <!-- FILTER BAR matching clearance tracking page design -->
      <div class="filter-bar" style="justify-content: space-between;">
        <!-- Left section: search and filter dropdowns -->
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
          <div class="search-wrapper" style="margin:0; min-width: 200px;">
            <input type="text" id="search" placeholder="Search by any field" onkeyup="applyFilters()" autocomplete="off">
            <span class="search-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16" y1="16" x2="22" y2="22"></line>
              </svg>
            </span>
          </div>
          <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <label for="courseFilter">Course:</label>
            <select id="courseFilter" onchange="applyFilters()">
              <option value="">All</option>
              <!-- options will be added by JavaScript -->
            </select>
            <label for="yearFilter">Year Level:</label>
            <select id="yearFilter" onchange="applyFilters()">
              <option value="">All</option>
              <option value="1st">1st Year</option>
              <option value="2nd">2nd Year</option>
              <option value="3rd">3rd Year</option>
              <option value="4th">4th Year</option>
              <option value="Irregular">Irregular</option>
            </select>
            <button onclick="clearFilters()" class="clear-btn">Clear</button>
            <button onclick="refreshTable()" class="refresh-btn">Refresh</button>
          </div>
        </div>
        <div style="display: flex; gap: 10px;">
          <button onclick="editSelectedHome()" class="export-btn">Edit Selected</button>
          <button onclick="deleteSelectedHome()" class="delete-btn">Delete Selected</button>
          <button onclick="showExportModal()" class="export-btn">Export</button>
        </div>
      </div>
      <div class="table-responsive">
        <table id="homeTable">
          <thead>
            <tr>
              <th style="width: 30px;"><input type="checkbox" id="selectAllHome" onchange="toggleSelectAllHome(this)"></th>
              <th>RFID NO.</th>
              <th>STUDENT NO.</th>
              <th>NAME</th>
              <th>COURSE</th>
              <th>YEAR LEVEL</th>
              <th>GENDER</th>
              <th>DATE</th>
            </tr>
          </thead>
          <tbody>
            <!-- rows generated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      checkPageAccess(['admin', 'superadmin']);
      loadStudents();
    });
  </script>
  <div id="helpModal" class="modal"><div class="modal-content"><p>Please contact system developer for assistance.</p><button onclick="closeHelpModal()">OK</button></div></div>
  <div id="logoutModal" class="modal"><div class="modal-content"><p id="logoutMessage">Are you sure you want to logout?</p><div style="display: flex; gap: 10px; justify-content: center;"><button onclick="confirmLogout()">Yes</button><button onclick="closeLogoutModal()">No</button></div></div></div>
  <div id="exportModal" class="modal">
    <div class="modal-content">
      <p>Choose export format:</p>
      <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
        <button onclick="exportChosen('pdf')">PDF</button>
        <button onclick="exportChosen('excel')">Excel</button>
        <button onclick="exportChosen('csv')">CSV</button>   <!-- new -->
      </div>
      <div style="display: flex; justify-content: center;">
        <button onclick="closeExportModal()">Cancel</button>
      </div>
    </div>
  </div>  
  <div id="confirmModal" class="modal"><div class="modal-content"><p id="confirmMessage">Are you sure?</p><div style="display: flex; gap: 10px; justify-content: center;"><button onclick="confirmDelete()">Yes</button><button onclick="closeConfirmModal()">No</button></div></div></div>
  <div id="messageModal" class="modal"><div class="modal-content"><p id="messageModalText">Message</p><button onclick="closeMessageModal()">OK</button></div></div>
  <div class="menu-overlay" onclick="closeMobileMenu()"></div>
  <button id="scrollToTopBtn" title="Go to top">↑</button>
  <div id="printContainer" style="display: none;"></div>
</body>
</html>
