<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registration Page</title>
  <link rel="icon" href="data:,"> <!-- empty favicon -->
  <link rel="stylesheet" href="style.css">
  <!-- Inline script to apply dark mode before paint -->
  <script>
    (function() {
      const darkMode = localStorage.getItem('darkMode');
      if (darkMode === 'enabled') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>
  <!-- Firebase SDK (modular) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyD_35ndCAFRu4tkyyK6jliIS8l3QqGVgK8",
      authDomain: "cmf-mcs.firebaseapp.com",
      projectId: "cmf-mcs",
      storageBucket: "cmf-mcs.firebasestorage.app",
      messagingSenderId: "156302336546",
      appId: "1:156302336546:web:373c1b25d24c4a9131e07b",
      measurementId: "G-PJY3RN9XLH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.auth = auth;
    window.db = db;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signOut = signOut;
    window.collection = collection;
    window.getDocs = getDocs;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.doc = doc;
    window.query = query;
    window.orderBy = orderBy;
  </script>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left" onclick="goHome()" style="cursor: pointer;">
      <img src="Resources/smcmilogo.png" alt="SMCMI Logo" class="logo">
    </div>
    <div class="topbar-right">
      <!-- Help first -->
      <div onclick="needHelp()" style="display: flex; align-items: center; cursor: pointer;">
        <span class="need-help-text">NEED HELP</span>
        <span class="help-icon">?</span>
      </div>
      <!-- Dark mode toggle second -->
      <div onclick="toggleDarkMode()" style="display: flex; align-items: center; cursor: pointer; margin-right: 8px;">
        <span class="darkmode-icon" id="darkModeIcon">☾</span>
      </div>
      <!-- Hamburger last (mobile only) -->
      <div class="hamburger" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="sidebar">
      <div class="nav" onclick="goHome()">HOME</div>
      <div class="nav" onclick="goRegister()">REGISTRATION</div>   <!-- removed active -->
      <div class="nav" onclick="goStatusUpdate()">STATUS UPDATE</div>
      <div class="nav" onclick="goRegistered()">REGISTERED</div>
      <div class="logout" onclick="logout()">LOGOUT</div>
    </div>

    <div class="content registration-content-page">
      <div class="registration-content">
        <div class="registration-layout">
          <!-- RFID field above both columns, centered -->
          <div class="rfid-container" style="display: flex; justify-content: center; margin-bottom: 20px;">
            <div style="width: 50%;">
              <label>RFID NUMBER <span class="required">*</span></label>
              <input type="text" id="rfidNumber" placeholder="Enter RFID" onchange="clearFieldError('rfidNumber')" style="width: 100%;">
            </div>
          </div>

          <div class="registration-form">
            <!-- Left Column -->
            <div class="form-column">
              <label>PROGRAM / COURSE<span class="required">*</span></label>
              <select id="program" onchange="clearFieldError('program')">
                <option value="" disabled selected>Select Program</option>
                <option value="BEED">(BEED) Bachelor of Elementary Education</option>
                <option value="BSA">(BSA) Bachelor of Science in Accountancy</option>
                <option value="BSBA">(BSBA) Bachelor of Science in Business Administration</option>
                <option value="BSED">(BSED) Bachelor of Science in Education</option>
                <option value="BSHM">(BSHM) Bachelor of Science in Hospitality Management</option>
                <option value="BSIT">(BSIT) Bachelor of Science in Information Technology</option>
                <option value="BSTM">(BSTM) Bachelor of Science in Tourism Management</option>
                <option value="Others">Others</option>   <!-- NEW OPTION -->
              </select>

              <label>STUDENT NUMBER <span class="required">*</span></label>
              <input type="text" id="studentNumber" placeholder="Enter student number" onchange="clearFieldError('studentNumber')">

              <label>SEMESTER <span class="required">*</span></label>
              <select id="semester" onchange="clearFieldError('semester')">
                <option value="" disabled selected>Select Semester</option>
                <option value="1st">1st Semester</option>
                <option value="2nd">2nd Semester</option>
              </select>

              <!-- NEW: Gender -->
              <label>GENDER <span class="required">*</span></label>
              <select id="gender" onchange="clearFieldError('gender')">
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>

              <label>STATUS</label>
              <select id="status" onchange="clearFieldError('status')">
                <option value="Pending" selected>Pending</option>
                <option value="Claimed">Claimed</option>
                <option value="Returned">Returned</option>
              </select>
            </div>

            <!-- Right Column -->
            <div class="form-column">
              <label>NAME <span class="required">*</span></label>
              <input type="text" id="name" placeholder="Enter full name" onchange="clearFieldError('name')">

              <label>YEAR LEVEL <span class="required">*</span></label>
              <select id="yearLevel" onchange="clearFieldError('yearLevel')">
                <option value="" disabled selected>Select Year Level</option>
                <option value="1st">1st Year</option>
                <option value="2nd">2nd Year</option>
                <option value="3rd">3rd Year</option>
                <option value="4th">4th Year</option>
              </select>

              <label>DATE <span class="required">*</span></label>
              <input type="date" id="date" onchange="clearFieldError('date')">

              <label>ACADEMIC YEAR <span class="required">*</span></label>
              <select id="academicYear" onchange="clearFieldError('academicYear')">
                <!-- populated by JavaScript -->
              </select>

              <!-- NEW: Remarks -->
              <label>ADDITIONAL REMARKS</label>
              <select id="remarks" onchange="clearFieldError('remarks')">
                <option value="" selected>None</option>
                <option value="Graduating">Graduating</option>
                <option value="Moving Up">Moving Up</option>
                <option value="Transferring">Transferring</option>
              </select>
            </div>
          </div>

          <button class="register-btn" onclick="validateAndRegister()">REGISTER</button>
        </div>
      </div>
    </div>
  </div>
<!-- SheetJS (XLSX) for proper Excel export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="script.js"></script>
  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <p>Registration successful!</p>
      <button onclick="closeSuccessModal()">OK</button>
    </div>
  </div>
  <!-- Help Modal -->
  <div id="helpModal" class="modal">
    <div class="modal-content">
      <p>Please contact the system administrator for assistance.</p>
      <button onclick="closeHelpModal()">OK</button>
    </div>
  </div>
  <!-- Logout Confirmation Modal -->
  <div id="logoutModal" class="modal">
    <div class="modal-content">
      <p id="logoutMessage">Are you sure you want to logout?</p>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="confirmLogout()">Yes</button>
        <button onclick="closeLogoutModal()">No</button>
      </div>
    </div>
  </div>
  <!-- Mobile menu overlay -->
<div class="menu-overlay" onclick="closeMobileMenu()"></div>
</body>
</html>
