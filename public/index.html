<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clearance - Login</title>
  <link rel="icon" type="image/svg+xml" href="Resources/icon.svg">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://cdn.sheetjs.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://cdn.sheetjs.com">
  <script type="module">
    import { auth, db } from './firebase.js';
    import { login, register, sendPasswordReset } from './auth.js';
    import { showRegisterModal, closeRegisterModal, showForgotPasswordModal, closeForgotPasswordModal } from './ui.js';
    import { toggleDarkMode, loadDarkModePreference, toggleMobileMenu, closeMobileMenu, handleHelpClick } from './ui.js';
    import { togglePassword, toggleRegPassword } from './utils.js'; // these are simple functions we can keep inline or in utils
    import './confirm.js';

    // Attach to window for onclick
    window.login = login;
    window.showRegisterModal = showRegisterModal;
    window.closeRegisterModal = closeRegisterModal;
    window.register = register;
    window.showForgotPasswordModal = showForgotPasswordModal;
    window.closeForgotPasswordModal = closeForgotPasswordModal;
    window.sendPasswordReset = sendPasswordReset;
    window.togglePassword = togglePassword;
    window.toggleRegPassword = toggleRegPassword;
    window.toggleDarkMode = toggleDarkMode;
    window.toggleMobileMenu = toggleMobileMenu;
    window.closeMobileMenu = closeMobileMenu;
    window.handleHelpClick = handleHelpClick;

    loadDarkModePreference();
  </script>
</head>
<body>
<script>
  (function() {
    const darkMode = localStorage.getItem('darkMode');
    if (darkMode === 'enabled') {
      document.body.classList.add('dark-mode');
    } else {
      document.body.classList.remove('dark-mode');
    }
  })();
</script>
  <div class="topbar">
    <div class="topbar-left">
      <div class="hamburger" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <img src="Resources/smcmilogoonly.png" alt="SMCMI Logo" class="logo-icon" loading="lazy">
      <img src="Resources/smcmilogotext.png" alt="St. Mary's College" class="logo-text" loading="lazy"> 
    </div>
    <div class="topbar-right">
      <!-- In the topbar-right section, replace the existing NEED HELP div with: -->
      <div id="helpButton" onclick="handleHelpClick()" style="display: flex; align-items: center; cursor: pointer;">
        <span id="helpText" class="need-help-text"></span>
        <span class="help-icon">?</span>
      </div>
      <div onclick="toggleDarkMode()" style="display: flex; align-items: center; cursor: pointer; margin-right: 8px;">
        <span class="darkmode-icon" id="darkModeIcon">☾</span>
      </div>
    </div>
  </div>
  <div class="login-container">
    <div class="logo-container">
      <img src="Resources/lightmodelogo.png" alt="Clearance Monitoring System" class="logo-light" loading="lazy">
      <img src="Resources/darkmodelogo.png" alt="Clearance Monitoring System" class="logo-dark" loading="lazy">
    </div>
    <div class="field">
      <label>USERNAME</label>
      <input type="text" id="username" autocomplete="off" onkeydown="return event.key !== ' '">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="text" id="password" style="-webkit-text-security: disc;" autocomplete="off" onkeydown="return event.key !== ' '">
    </div>
    <div class="show-password">
      <span>SHOW PASSWORD</span>
      <input type="checkbox" onclick="togglePassword()">
    </div>
    <button onclick="login()">LOGIN</button>
    <div class="links">
      <a href="#" onclick="showRegisterModal()">Register</a>
      <a href="#" onclick="showForgotPasswordModal()">Forgot Password?</a>
    </div>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="modal" onclick="if(event.target === this) closeErrorModal()">
    <div class="modal-content">
      <p>Invalid username or password</p>
      <button onclick="closeErrorModal()">OK</button>
    </div>
  </div>

  <!-- Help Modal -->
  <div id="helpModal" class="modal">
    <div class="modal-content">
      <p>Please contact system developer for assistance.</p>
      <button onclick="closeHelpModal()">OK</button>
    </div>
  </div>

  <!-- Register Modal -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <h3>Register New Account</h3>
      <input type="email" id="regEmail" placeholder="Email"
            autocomplete="off" spellcheck="false" autocorrect="off"
            readonly onfocus="this.removeAttribute('readonly')">
      <input type="password" id="regPassword" placeholder="Password"
            autocomplete="new-password" spellcheck="false"
            readonly onfocus="this.removeAttribute('readonly')">
      <input type="password" id="regConfirmPassword" placeholder="Confirm Password"
            autocomplete="new-password" spellcheck="false"
            readonly onfocus="this.removeAttribute('readonly')">
      <div class="show-password-reg">
        <span>SHOW PASSWORD</span>
        <input type="checkbox" id="showRegPassword" onclick="toggleRegPassword()">
      </div>
      <div class="button-group">
        <button onclick="register()" class="export-btn">Register</button>
        <button onclick="closeRegisterModal()" class="clear-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotPasswordModal" class="modal">
    <div class="modal-content">
      <h3>Reset Password</h3>
      <input type="email" id="resetEmail" placeholder="Enter your email"
            autocomplete="off" spellcheck="false" autocorrect="off"
            readonly onfocus="this.removeAttribute('readonly')">
      <div class="button-group">
        <button onclick="sendPasswordReset()" class="export-btn">Send Reset Email</button>
        <button onclick="closeForgotPasswordModal()" class="clear-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Message Modal (placed last to appear on top) -->
  <div id="messageModal" class="modal">
    <div class="modal-content">
      <p id="messageModalText">Message</p>
      <button onclick="closeMessageModal()">OK</button>
    </div>
  </div>

  <div class="menu-overlay" onclick="closeMobileMenu()"></div>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
