<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registration Page</title>
  <link rel="icon" type="image/svg+xml" href="Resources/icon.svg">
  <link rel="stylesheet" href="style.css">
  <!-- Add these inside <head> after the existing links -->
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://cdn.sheetjs.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://cdn.sheetjs.com">
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, orderBy, addDoc, where, limit, writeBatch } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyD_35ndCAFRu4tkyyK6jliIS8l3QqGVgK8",
      authDomain: "cmf-mcs.firebaseapp.com",
      projectId: "cmf-mcs",
      storageBucket: "cmf-mcs.firebasestorage.app",
      messagingSenderId: "156302336546",
      appId: "1:156302336546:web:373c1b25d24c4a9131e07b",
      measurementId: "G-PJY3RN9XLH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.auth = auth;
    window.db = db;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signOut = signOut;
    window.onAuthStateChanged = onAuthStateChanged;   // <-- ADD THIS
    window.collection = collection;
    window.getDocs = getDocs;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.doc = doc;
    window.query = query;
    window.orderBy = orderBy;
    window.addDoc = addDoc;
    window.where = where;
    window.limit = limit; 
    window.writeBatch = writeBatch;
  </script>
</head>
<body>
  <script>
    (function() {
      const darkMode = localStorage.getItem('darkMode');
      if (darkMode === 'enabled') document.body.classList.add('dark-mode');
    })();
  </script>
  <div class="topbar">
    <div class="topbar-left">
      <div class="hamburger" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <img src="Resources/smcmilogoonly.png" alt="SMCMI Logo" class="logo-icon" loading="lazy">
      <img src="Resources/smcmilogotext.png" alt="St. Mary's College" class="logo-text" loading="lazy"> 
    </div>
    <div class="topbar-right">
      <div id="helpButton" onclick="handleHelpClick()" style="display: flex; align-items: center; cursor: pointer;">
        <span id="helpText" class="need-help-text"></span>
        <span class="help-icon">?</span>
      </div>
      <div onclick="toggleDarkMode()" style="display: flex; align-items: center; cursor: pointer; margin-right: 8px;">
        <span class="darkmode-icon" id="darkModeIcon">☾</span>
      </div>
    </div>
  </div>
  <div class="main-wrapper">
    <div class="sidebar">
      <div class="nav" onclick="goHome()">STUDENT LIST</div>
      <div class="nav" onclick="goRegister()">REGISTRATION</div>
      <div class="nav" onclick="goStatusUpdate()">STATUS UPDATE</div>
      <div class="nav" onclick="goRegistered()">CLEARANCE LOGS</div>
      <div class="nav" onclick="goAdmin()">MANAGE PROGRAMS</div>
      <div class="sidebar-spacer"></div>
      <div class="logout" onclick="logout()">LOGOUT</div>
    </div>
    <div class="content registration-content-page">
      <div class="registration-content">
        <div class="registration-layout">
          <div style="display: flex; justify-content: center; margin-bottom: 20px;">
            <div style="width: 100%; max-width: 400px;">
              <label style="font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; display: block; letter-spacing: 0.5px;">
                RFID NUMBER <span class="required">*</span>
              </label>
              <div style="display: flex; gap: 10px;">
                <input type="text" id="rfidNumber" placeholder="Enter RFID" tabindex="1"
                       onblur="checkRFID()" onkeypress="if(event.key==='Enter') checkRFID()" 
                       onchange="clearFieldError('rfidNumber')" style="flex: 1;" 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="32"
                       autocomplete="off">
                <button type="button" onclick="clearRegistrationForm()" class="clear-btn">Clear</button>
                <button type="button" onclick="refreshRegistrationForm()" class="refresh-btn" style="height: 38px;">Refresh</button>
              </div>
            </div>
          </div>
          <div class="registration-form">
            <div class="form-column">
              <label>SURNAME <span class="required">*</span></label>
              <input type="text" id="surname" data-field="surname" placeholder="Enter Surname" tabindex="2"
                     maxlength="64"
                     oninput="this.value = this.value.replace(/[^\p{L}\s\'-]/gu, '')"
                     onchange="clearFieldError('surname')"
                     autocomplete="off">
              <label>MIDDLE NAME</label>
              <input type="text" id="middleName" data-field="middleName" placeholder="Enter Middle Name (optional)" tabindex="4"
                     maxlength="30"
                     oninput="this.value = this.value.replace(/[^\p{L}\s\'-]/gu, '')"
                     onchange="clearFieldError('middleName')"
                     autocomplete="off">
              <label>PROGRAM / COURSE<span class="required">*</span></label>
              <select id="program" data-field="program" tabindex="6" onchange="clearFieldError('program')">
                <option value="" disabled selected>Select Program</option>
                <option value="Others">OTHERS</option>
              </select>
              <label>GENDER <span class="required">*</span></label>
              <select id="gender" data-field="gender" tabindex="8" onchange="clearFieldError('gender')">
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-column">
              <label>FIRST NAME <span class="required">*</span></label>
              <input type="text" id="firstName" data-field="firstName" placeholder="Enter First Name" tabindex="3"
                     maxlength="64"
                     oninput="this.value = this.value.replace(/[^\p{L}\s\'-]/gu, '')"
                     onchange="clearFieldError('firstName')"
                     autocomplete="off">
              <label>STUDENT NUMBER <span class="required">*</span></label>
              <input type="text" id="studentNumber" placeholder="Enter Student Number" tabindex="5"
                     maxlength="7" oninput="formatStudentNumber(this)" onchange="clearFieldError('studentNumber')" autocomplete="off">
              <label>YEAR LEVEL <span class="required">*</span></label>
              <select id="yearLevel" data-field="yearLevel" tabindex="7" onchange="clearFieldError('yearLevel')">
                <option value="" disabled selected>Select Year Level</option>
                <option value="1st">1st Year</option>
                <option value="2nd">2nd Year</option>
                <option value="3rd">3rd Year</option>
                <option value="4th">4th Year</option>
                <option value="Irregular">Irregular</option>
              </select>
              <label>DATE <span class="required">*</span></label>
              <input type="date" id="date" tabindex="9" disabled onchange="clearFieldError('date')" autocomplete="off">
            </div>
          </div>
          <button class="register-btn" id="registerButton" onclick="validateAndRegister()">REGISTER</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = 'index.html';
          return;
        }
        const role = await getUserRole(user);
        currentUserRole = role;
        updateSidebarForRole(role);
      });
    });
  </script>
  <div id="successModal" class="modal"><div class="modal-content"><p>Registration successful!</p><button onclick="closeSuccessModal()">OK</button></div></div>
  <div id="helpModal" class="modal"><div class="modal-content"><p>Please contact system developer for assistance.</p><button onclick="closeHelpModal()">OK</button></div></div>
  <div id="logoutModal" class="modal"><div class="modal-content"><p id="logoutMessage">Are you sure you want to logout?</p><div style="display: flex; gap: 10px; justify-content: center;"><button onclick="confirmLogout()">Yes</button><button onclick="closeLogoutModal()">No</button></div></div></div>
  <div id="updateConfirmModal" class="modal">
    <div class="modal-content">
      <p id="updateConfirmMessage">Are you sure you want to update this student?</p>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="confirmUpdate()">Yes</button>
        <button onclick="closeUpdateConfirmModal()">No</button>
      </div>
    </div>
  </div>
  <div id="updateSuccessModal" class="modal">
    <div class="modal-content">
      <p id="updateSuccessMessage">Update successful!</p>
      <button onclick="redirectAfterUpdate()">OK</button>
    </div>
  </div>
  <div id="messageModal" class="modal">
    <div class="modal-content">
      <p id="messageModalText">Message</p>
      <button onclick="closeMessageModal()">OK</button>
    </div>
  </div>
  <div class="menu-overlay" onclick="closeMobileMenu()"></div>
  <button id="scrollToTopBtn" title="Go to top">↑</button>
  <div id="printContainer" style="display: none;"></div>
</body>
</html>
